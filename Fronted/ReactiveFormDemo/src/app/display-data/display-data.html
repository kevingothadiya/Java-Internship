<hr>
<h2 style="text-align: center;">Get All Student</h2>
<div class="d-grid gap-2 col-6 mx-auto">
  <button class="btn btn-primary" type="button" (click)="getAllStudent()">Get Students</button>
</div>
<hr>
<table class="table" *ngIf="displayTable">
  <thead class="table-dark">
    <tr>
      <th scope="col">id</th>
      <th scope="col">Name</th>
      <th scope="col">Email ID</th>
      <th scope="col">Gender</th>
      <th scope="col">Phone Number</th>
      <th scope="col">City</th>
      <th scope="col">Address</th>
      <th scope="col">Subjects</th>
      <th scope="col">Operation</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let std of myStudentData">
      <th scope="row">{{std.id}}</th>
      <td>{{std.name}}</td>
      <td>{{std.email}}</td>
      <td>{{std.gender}}</td>
      <td>{{std.phone}}</td>
      <td>{{std.city}}</td>
      <td>{{std.address}}</td>
      <td>{{std.subjects}}</td>
      <td>
        <button type="button" class="btn btn-danger m-1" data-bs-toggle="modal" data-bs-target="#deleteModal" (click)="deleteStudentById(std.id)">Delete</button>
    </td>
    </tr>
  </tbody>
</table>
