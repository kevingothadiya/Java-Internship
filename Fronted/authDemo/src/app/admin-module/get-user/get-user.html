<div class="container mt-5">

  <div class="card shadow-lg border-0 p-4 table-card">

    <h4 class="mb-4 fw-bold text-primary">User List</h4>

    <div class="table-responsive">
      <table class="table align-middle custom-table">
        <thead>
          <tr>
            <th>Id</th>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Phone Number</th>
            <th>Status</th>
            <th>Operation</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let user of users">
            <th scope="row">{{user.id}}</th>
            <td>{{user.name}}</td>
            <td>{{user.email}}</td>
            <td>
              <span class="badge bg-info text-dark px-3 py-2">
                {{user.role}}
              </span>
            </td>
            <td>{{user.phoneNum}}</td>
            <td>
              <span class="badge px-3 py-2"
                [ngClass]="{
                  'bg-success': user.status === 'ACTIVE',
                  'bg-danger': user.status === 'INACTIVE'
                }">
                {{user.status}}
              </span>
            </td>
            <td>
              <button type="button" class="btn btn-primary me-2" (click)="openUpdateModal(user)">Edit</button>
              <button type="button" class="btn btn-danger" (click)="deleteUser(user.id)">Delete</button>
            </td>
          </tr>
        </tbody>

      </table>
    </div>

  </div>

</div>

<!-- Edit User Modal -->
<div class="modal fade" id="editUserModal" tabindex="-1" aria-labelledby="editUserModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="editUserModalLabel">Edit User</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <form [formGroup]="updateForm" (ngSubmit)="updateUser()">
        <div class="modal-body">
          <div class="mb-3">
            <label>Name</label>
            <input type="text" class="form-control" formControlName="name">
          </div>
          <div class="mb-3">
            <label>Email</label>
            <input type="email" class="form-control" formControlName="email">
          </div>
          <div class="mb-3">
            <label>Role</label>
            <select class="form-select" formControlName="role">
              <option value="DONOR">DONOR</option>
              <option value="HOSPITAL">HOSPITAL</option>
              <option value="USER">USER</option>
            </select>
          </div>
          <div class="mb-3">
            <label>Phone Number</label>
            <input type="text" class="form-control" formControlName="phoneNum">
          </div>
          <div class="mb-3">
            <label>Status</label>
            <select class="form-select" formControlName="status">
              <option value="ACTIVE">ACTIVE</option>
              <option value="INACTIVE">INACTIVE</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          <button type="submit" class="btn btn-success">Update User</button>
        </div>
      </form>
    </div>
  </div>
</div>
