<table class="table">
  <thead class="table-dark">
    <tr>
      <th scope="col">Id</th>
      <th scope="col">First Name</th>
      <th scope="col">Last Name</th>
      <th scope="col">Age</th>
      <th scope="col">Contact Number</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let std of student;index as i">
      <th scope="row">{{i+1}}</th>
      <td>{{std.fname}}</td>
      <td>{{std.lname}}</td>
      <td>{{std.age}}</td>
      <td>{{std.contactNumber}}</td>
    </tr>
  </tbody>
</table>
