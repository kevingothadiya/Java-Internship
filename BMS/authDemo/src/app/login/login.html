<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">

      <div class="card shadow login-card">
        <div class="card-body">

          <h3 class="text-center text-danger mb-4">Login</h3>

          <!-- Lockout banner -->
          <div *ngIf="isLocked" class="alert alert-danger text-center">
            <i class="bi bi-lock-fill me-2"></i>
            Account locked. Try again in <strong>{{ countdownDisplay }}</strong>
          </div>

          <!-- Attempt warning -->
          <div *ngIf="!isLocked && errorMsg" class="alert alert-warning py-2">
            {{ errorMsg }}
          </div>

          <form [formGroup]="myLogin" (ngSubmit)="onVarify()">

            <!-- Email — always editable -->
            <div class="mb-3">
              <label>Email</label>
              <input type="email" class="form-control" formControlName="email"
                [class.is-invalid]="formControl['email'].touched && formControl['email'].invalid">
              <div class="invalid-feedback">
                <span *ngIf="formControl['email'].errors?.['required']">Email Id can not be empty</span>
                <span *ngIf="formControl['email'].errors?.['pattern']">Please Enter Valid Email Id</span>
              </div>
            </div>

            <!-- Password — always editable -->
            <div class="mb-3">
              <label>Password</label>
              <input type="password" class="form-control" formControlName="password"
                [class.is-invalid]="formControl['password'].touched && formControl['password'].invalid">
              <div class="invalid-feedback">
                <span *ngIf="formControl['password'].errors?.['required']">Password can not be empty</span>
              </div>
            </div>

            <!-- Forgot Password -->
            <div class="text-end mb-2">
              <a routerLink="/forgot-password" class="text-danger fw-semibold small">Forgot Password?</a>
            </div>

            <!-- Attempts dots -->
            <div *ngIf="!isLocked && failedAttempts > 0" class="text-center mb-2">
              <small class="text-muted">
                Failed attempts:
                <span *ngFor="let i of [1,2,3]" class="me-1"
                  [class.text-danger]="i <= failedAttempts"
                  [class.text-secondary]="i > failedAttempts">&#9679;</span>
              </small>
            </div>

            <!-- Button — only disabled when locked -->
            <button class="btn btn-danger w-100 mt-2" type="submit" [disabled]="isLocked">
              <i *ngIf="isLocked" class="bi bi-lock-fill me-2"></i>
              {{ isLocked ? 'Locked (' + countdownDisplay + ')' : 'Login' }}
            </button>

          </form>

          <div class="text-center mt-3">
            <small>
              Don't have an account?
              <a routerLink="/registration" class="text-danger fw-bold">Register</a>
            </small>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>
