<div class="container mt-5">
  <div class="card shadow-lg border-0 p-4 table-card">

    <h4 class="mb-4 fw-bold text-primary">User List</h4>

    <div class="table-responsive">
      <table class="table align-middle custom-table">
        <thead>
          <tr>
            <!-- <th>Id</th> -->
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Phone Number</th>
            <th>Status</th>
            <th>Operation</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let user of users">
            <!-- <th scope="row">{{ user.id }}</th> -->
            <td>{{ user.name }}</td>
            <td>{{ user.email }}</td>
            <td>
              <span class="badge bg-info text-dark px-3 py-2">{{ user.role }}</span>
            </td>
            <td>{{ user.phoneNum }}</td>
            <td>
              <span class="badge px-3 py-2"
                [ngClass]="{ 'bg-success': user.status === 'ACTIVE', 'bg-danger': user.status === 'INACTIVE' }">
                {{ user.status }}
              </span>
            </td>
            <td>
              <button class="btn btn-primary btn-sm me-2" (click)="openUpdateModal(user)">Edit</button>
              <button class="btn btn-danger btn-sm" (click)="deleteUser(user.id)">Delete</button>
            </td>
          </tr>
          <tr *ngIf="users.length === 0">
            <td colspan="7" class="text-center text-muted py-4">No users found.</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Pagination Bar -->
    <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mt-3 px-1">

      <!-- Left: Showing X to Y of Z rows + page size selector -->
      <div class="d-flex align-items-center gap-2 text-muted small">
        <span>Showing {{ showingFrom }} to {{ showingTo }} of {{ totalElements }} rows</span>
        <select class="form-select form-select-sm" style="width:75px"
          [value]="pageSize" (change)="onPageSizeChange($event)">
          <option *ngFor="let opt of pageSizeOptions" [value]="opt">{{ opt }}</option>
        </select>
      </div>

      <!-- Right: Page navigation -->
      <nav>
        <ul class="pagination pagination-sm mb-0">

          <!-- First -->
          <li class="page-item" [class.disabled]="currentPage === 0">
            <a class="page-link" (click)="goToPage(0)" title="First">&laquo;&laquo;</a>
          </li>

          <!-- Prev -->
          <li class="page-item" [class.disabled]="currentPage === 0">
            <a class="page-link" (click)="goToPage(currentPage - 1)" title="Previous">&laquo;</a>
          </li>

          <!-- Page numbers -->
          <li class="page-item" *ngFor="let p of pageNumbers"
            [class.active]="p === currentPage">
            <a class="page-link" (click)="goToPage(p)">{{ p + 1 }}</a>
          </li>

          <!-- Next -->
          <li class="page-item" [class.disabled]="currentPage === totalPages - 1">
            <a class="page-link" (click)="goToPage(currentPage + 1)" title="Next">&raquo;</a>
          </li>

          <!-- Last -->
          <li class="page-item" [class.disabled]="currentPage === totalPages - 1">
            <a class="page-link" (click)="goToPage(totalPages - 1)" title="Last">&raquo;&raquo;</a>
          </li>

        </ul>
      </nav>

    </div>

  </div>
</div>

<!-- Edit User Modal -->
<div class="modal fade" id="editUserModal" tabindex="-1" aria-labelledby="editUserModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Edit User</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form [formGroup]="updateForm" (ngSubmit)="updateUser()">
        <div class="modal-body">
          <div class="mb-3">
            <label>Name</label>
            <input type="text" class="form-control" formControlName="name">
          </div>
          <div class="mb-3">
            <label>Email</label>
            <input type="email" class="form-control" formControlName="email">
          </div>
          <div class="mb-3">
            <label>Role</label>
            <select class="form-select" formControlName="role">
              <option value="DONOR">DONOR</option>
              <option value="HOSPITAL">HOSPITAL</option>
              <option value="USER">USER</option>
            </select>
          </div>
          <div class="mb-3">
            <label>Phone Number</label>
            <input type="text" class="form-control" formControlName="phoneNum">
          </div>
          <div class="mb-3">
            <label>Status</label>
            <select class="form-select" formControlName="status">
              <option value="ACTIVE">ACTIVE</option>
              <option value="INACTIVE">INACTIVE</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          <button type="submit" class="btn btn-success">Update User</button>
        </div>
      </form>
    </div>
  </div>
</div>
