<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">

      <div class="card shadow">
        <div class="card-body">

          <h3 class="text-center text-danger mb-4">Donor Registration</h3>

          <form [formGroup]="donorForm" (ngSubmit)="onSubmit()">

            <!-- Blood Group -->
            <div class="mb-3">
              <label class="form-label">Blood Group</label>
              <select class="form-select" formControlName="bloodGrp"
                      [class.is-invalid]="formControl['bloodGrp'].touched && formControl['bloodGrp'].invalid">
                <option value="" disabled selected>--Select Blood Group--</option>
                <option *ngFor="let bg of bloodGroups" [value]="bg">{{bg}}</option>
              </select>
              <div class="invalid-feedback" *ngIf="formControl['bloodGrp'].touched && formControl['bloodGrp'].invalid">
                Blood group is required
              </div>
            </div>

            <!-- Age -->
            <div class="mb-3">
              <label class="form-label">Age</label>
              <input type="number" class="form-control" formControlName="age"
                     [class.is-invalid]="formControl['age'].touched && formControl['age'].invalid">
              <div class="invalid-feedback" *ngIf="formControl['age'].touched && formControl['age'].invalid">
                <div *ngIf="formControl['age'].errors?.['required']">Age is required</div>
                <div *ngIf="formControl['age'].errors?.['min'] || formControl['age'].errors?.['max']">
                  Age must be between 18 and 65
                </div>
              </div>
            </div>

            <!-- Gender -->
            <div class="mb-3">
              <label class="form-label">Gender</label>
              <select class="form-select" formControlName="gender"
                      [class.is-invalid]="formControl['gender'].touched && formControl['gender'].invalid">
                <option value="" disabled selected>--Select Gender--</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
              </select>
              <div class="invalid-feedback" *ngIf="formControl['gender'].touched && formControl['gender'].invalid">
                Gender is required
              </div>
            </div>

            <!-- City -->
            <div class="mb-3">
              <label class="form-label">City</label>
              <input type="text" class="form-control" formControlName="city"
                     [class.is-invalid]="formControl['city'].touched && formControl['city'].invalid">
              <div class="invalid-feedback" *ngIf="formControl['city'].touched && formControl['city'].invalid">
                City is required
              </div>
            </div>

            <!-- Last Donation Date -->
            <div class="mb-3">
              <label class="form-label">Last Donation Date</label>
              <input type="date" class="form-control" formControlName="lastDonationDate">
            </div>

            <!-- Available to Donate -->
            <div class="mb-3 form-check">
              <input type="checkbox" class="form-check-input" formControlName="available" id="availableCheck">
              <label class="form-check-label" for="availableCheck">Available to Donate</label>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn btn-danger w-100" [disabled]="donorForm.invalid">Register</button>

          </form>

        </div>
      </div>

    </div>
  </div>
</div>
