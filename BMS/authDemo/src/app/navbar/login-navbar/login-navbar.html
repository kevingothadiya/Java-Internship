<nav class="navbar navbar-expand-lg navbar-dark bg-danger">
  <div class="container">
    <a class="navbar-brand fw-bold" routerLink="/">🩸 BloodCare</a>

    <div class="ms-auto">

      <!-- If NOT logged in -->
      <ng-container *ngIf="!isLoggedIn(); else loggedInBlock">
        <a class="btn btn-light me-2" routerLink="/registration">Register</a>
        <a class="btn btn-outline-light" routerLink="/login">Login</a>
      </ng-container>

      <!-- If logged in -->
      <ng-template #loggedInBlock>
        <button class="btn btn-dark" (click)="logout()">Logout</button>
      </ng-template>

    </div>
  </div>
</nav>
