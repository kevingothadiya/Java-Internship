server:
  port: 8888

spring:
  application:
    name: config-server

  datasource:
    url: jdbc:mysql://localhost:3306/configdb
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update

# Register config server to Eureka (optional but recommended)
eureka:
  client:
    service-url:
      defaultZone: http://localhost:9500/eureka