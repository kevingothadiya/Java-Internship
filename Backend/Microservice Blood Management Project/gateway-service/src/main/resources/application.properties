spring.application.name=gateway-service
server.port=9090

eureka.client.service-url.defaultZone=http://localhost:9500/eureka

# AUTH SERVICE
spring.cloud.gateway.routes[0].id=authservice
spring.cloud.gateway.routes[0].uri=lb://AUTHSERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**


# DONOR SERVICE
spring.cloud.gateway.routes[1].id=donorservice
spring.cloud.gateway.routes[1].uri=lb://DONORSERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/donor/**

# HOSPITAL SERVICE
spring.cloud.gateway.routes[2].id=hospitalservice
spring.cloud.gateway.routes[2].uri=lb://HOSPITALSERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/hospital/**

# ADMIN SERVICE
spring.cloud.gateway.routes[3].id=adminservice
spring.cloud.gateway.routes[3].uri=lb://ADMINSERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/admin/**
#spring.cloud.gateway.routes[3].filters[0]=StripPrefix=1

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always